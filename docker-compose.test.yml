services:
  postgres-test:
    image: postgres:15
    container_name: typelevel-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    volumes:
      - ./src/test/resources/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    tmpfs: /var/lib/postgresql/data